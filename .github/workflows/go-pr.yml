name: PR

on:
    pull_request:
        branches: [develop]

jobs:
    tests:
        name: Build/test on ${{ matrix.name }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: Linux
                      os: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                go-version-file: go.mod
            - name: Vet
              run: go vet ./...
            - name: Build
              run: |
                    go build -v ./...
            - name: Test
              run: |
                    go test -v ./...
