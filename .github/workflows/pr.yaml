name: PR Validation

on:
  pull_request:
    branches:
      - master
      - develop

permissions:
  contents: read

jobs:
  validate:
    name: Validate on ${{ matrix.name }}

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: |
          go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Test
        run: |
          go test -race ./...
